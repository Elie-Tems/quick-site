[functions.expire-subscriptions]
verify_jwt = false

# publish-payment-recovery is an hourly cron (no user JWT) that nudges merchants
# who started but never finished the publish payment. Optional CRON_SECRET guard.
[functions.publish-payment-recovery]
verify_jwt = false

# onboarding-abandoned is an hourly cron (no user JWT) that nudges users who
# signed up but never finished onboarding. Optional CRON_SECRET guard.
[functions.onboarding-abandoned]
verify_jwt = false

# leads-followup-run is a daily cron (no user JWT) that emails each merchant a digest
# of leads whose follow-up reminder is due today/overdue. Optional CRON_SECRET guard.
[functions.leads-followup-run]
verify_jwt = false

# synagogue-zmanim serves the public display screen + storefront: fixed prayer times
# + live zmanim/Hebrew-date (Hebcal). Public, reads only non-sensitive info.
[functions.synagogue-zmanim]
verify_jwt = false

# synagogue-member: a member looks up their own open pledges by phone on the shul
# site (to pay). Public, phone-gated + rate-limited.
[functions.synagogue-member]
verify_jwt = false

# billing-charge-run is the monthly self-managed billing cron (charges stored
# tokens via cc/bill). Cron-only; optional CRON_SECRET guard.
[functions.billing-charge-run]
verify_jwt = false

# charge-addon charges the merchant's saved token for a one-off add-on (AI
# credits etc.) - server-priced, idempotent. Merchant-authenticated.
[functions.charge-addon]
verify_jwt = true

# addon-subscribe enables a RECURRING add-on (Google Reviews, email, WhatsApp) as a
# subscription line-item: prorated first charge on the saved Cardcom token, then
# consolidated into the monthly invoice. Server-priced, idempotent. Merchant-auth.
[functions.addon-subscribe]
verify_jwt = true

# send-presentation is an admin-triggered one-off (guarded by its own token), called
# without a JWT.
[functions.send-presentation]
verify_jwt = false

# billing-cardcom-checkout starts a publish subscription via Cardcom (LowProfile/
# Create - charge + save token + invoice in one). Merchant-authenticated.
[functions.billing-cardcom-checkout]
verify_jwt = true

# billing-cardcom-webhook is the Cardcom result callback (no JWT); it authenticates
# via the shared secret in ?secret= and re-verifies via LowProfile/GetLpResult.
[functions.billing-cardcom-webhook]
verify_jwt = false

# orders-create is the COD/no-payment checkout, called from the PUBLIC storefront
# by anonymous end-customers (prices are recomputed server-side).
[functions.orders-create]
verify_jwt = false

# customer-orders is the public "my orders" magic-link lookup (own HMAC token +
# rate-limit guard), called by anonymous shoppers.
[functions.customer-orders]
verify_jwt = false

# whatsapp-webhook receives inbound WhatsApp messages from Twilio (no JWT); it verifies
# Twilio's X-Twilio-Signature with TWILIO_AUTH_TOKEN instead.
[functions.whatsapp-webhook]
verify_jwt = false

# sitemap is fetched by search-engine crawlers - no auth.
[functions.sitemap]
verify_jwt = false

# Unified payment functions (dispatch to a provider adapter by business.payment_provider).
# payments-create is called from the PUBLIC storefront by anonymous end-customers.
[functions.payments-create]
verify_jwt = false

# payments-callback is the gateway server-to-server IPN; authenticated by the
# adapter's signature check (e.g. PayPlus HMAC), not a Supabase JWT.
[functions.payments-callback]
verify_jwt = false

# payments-confirm is called by the public storefront when the customer returns from
# the gateway; it re-queries the gateway server-side before settling (no JWT).
[functions.payments-confirm]
verify_jwt = false

# payments-verify is called by the logged-in merchant.
[functions.payments-verify]
verify_jwt = true

# send-platform-email is called by the app (e.g. welcome after sign-up); requires a JWT.
[functions.send-platform-email]
verify_jwt = true

