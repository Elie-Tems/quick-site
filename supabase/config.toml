project_id = "vwqrjaktpdqciiteuhtb"

[functions.analyze-website]
verify_jwt = true

[functions.generate-hero-image]
verify_jwt = true

[functions.generate-product-image]
verify_jwt = true

[functions.generate-about-text]
verify_jwt = true

[functions.generate-styled-product-image]
verify_jwt = true

# icount-webhook is called by iCount (no Supabase JWT); it authenticates via
# ICOUNT_WEBHOOK_SECRET instead, so JWT verification must stay disabled.
[functions.icount-webhook]
verify_jwt = false

[functions.finalize-publish]
verify_jwt = true

# expire-subscriptions is invoked by a scheduled cron (no user JWT); it
# authenticates via the CRON_SECRET header instead.
[functions.expire-subscriptions]
verify_jwt = false

# Unified payment functions (dispatch to a provider adapter by business.payment_provider).
# payments-create is called from the PUBLIC storefront by anonymous end-customers.
[functions.payments-create]
verify_jwt = false

# payments-callback is the gateway server-to-server IPN; authenticated by the
# adapter's signature check (e.g. PayPlus HMAC), not a Supabase JWT.
[functions.payments-callback]
verify_jwt = false

# payments-verify is called by the logged-in merchant.
[functions.payments-verify]
verify_jwt = true
