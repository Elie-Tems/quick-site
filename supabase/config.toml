project_id = "ytqgeoviokgxxwalieev"

[functions.analyze-website]
verify_jwt = true

[functions.generate-hero-image]
verify_jwt = true

[functions.generate-product-image]
verify_jwt = true

[functions.generate-about-text]
verify_jwt = true

[functions.generate-styled-product-image]
verify_jwt = true

# icount-webhook is called by iCount (no Supabase JWT); it authenticates via
# ICOUNT_WEBHOOK_SECRET instead, so JWT verification must stay disabled.
[functions.icount-webhook]
verify_jwt = false

[functions.finalize-publish]
verify_jwt = true

# expire-subscriptions is invoked by a scheduled cron (no user JWT); it
# authenticates via the CRON_SECRET header instead.
[functions.expire-subscriptions]
verify_jwt = false

# payplus-create-payment is called from the PUBLIC storefront by anonymous
# end-customers, so no Supabase JWT is available.
[functions.payplus-create-payment]
verify_jwt = false

# payplus-callback is the PayPlus server-to-server IPN; it authenticates via the
# merchant's secret-key HMAC signature, not a Supabase JWT.
[functions.payplus-callback]
verify_jwt = false

# payplus-verify-credentials is called by the logged-in merchant.
[functions.payplus-verify-credentials]
verify_jwt = true
