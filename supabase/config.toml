[functions.domain-balance-check]
verify_jwt = true

# google-reviews is called by the logged-in merchant only.
[functions.google-reviews]
verify_jwt = true

# daily-digest is triggered by pg_cron with the x-cron-secret header (no JWT).
[functions.daily-digest]
verify_jwt = false

