project_id = "ytqgeoviokgxxwalieev"

[functions.analyze-website]
verify_jwt = true

[functions.generate-hero-image]
verify_jwt = true

[functions.generate-product-image]
verify_jwt = true

[functions.generate-about-text]
verify_jwt = true

[functions.generate-styled-product-image]
verify_jwt = true

# icount-webhook is called by iCount (no Supabase JWT); it authenticates via
# ICOUNT_WEBHOOK_SECRET instead, so JWT verification must stay disabled.
[functions.icount-webhook]
verify_jwt = false

[functions.finalize-publish]
verify_jwt = true

# expire-subscriptions is invoked by a scheduled cron (no user JWT); it
# authenticates via the CRON_SECRET header instead.
[functions.expire-subscriptions]
verify_jwt = false

# send-presentation is an admin-triggered one-off (guarded by its own token), called
# without a JWT.
[functions.send-presentation]
verify_jwt = false

# orders-create is the COD/no-payment checkout, called from the PUBLIC storefront
# by anonymous end-customers (prices are recomputed server-side).
[functions.orders-create]
verify_jwt = false

# customer-orders is the public "my orders" magic-link lookup (own HMAC token +
# rate-limit guard), called by anonymous shoppers.
[functions.customer-orders]
verify_jwt = false

# whatsapp-webhook receives inbound WhatsApp messages from Twilio (no JWT); it verifies
# Twilio's X-Twilio-Signature with TWILIO_AUTH_TOKEN instead.
[functions.whatsapp-webhook]
verify_jwt = false

# sitemap is fetched by search-engine crawlers - no auth.
[functions.sitemap]
verify_jwt = false

# Unified payment functions (dispatch to a provider adapter by business.payment_provider).
# payments-create is called from the PUBLIC storefront by anonymous end-customers.
[functions.payments-create]
verify_jwt = false

# payments-callback is the gateway server-to-server IPN; authenticated by the
# adapter's signature check (e.g. PayPlus HMAC), not a Supabase JWT.
[functions.payments-callback]
verify_jwt = false

# payments-verify is called by the logged-in merchant.
[functions.payments-verify]
verify_jwt = true

# send-platform-email is called by the app (e.g. welcome after sign-up); requires a JWT.
[functions.send-platform-email]
verify_jwt = true

# domain-purchase is called by the logged-in merchant to start a domain buy.
[functions.domain-purchase]
verify_jwt = true

# domain-purchase-webhook is the iCount IPN (no Supabase JWT); it authenticates
# via ICOUNT_WEBHOOK_SECRET (header or ?secret=), like icount-webhook.
[functions.domain-purchase-webhook]
verify_jwt = false

# domain-balance-check is invoked by a daily cron (anon bearer) and by the admin
# refresh button (user JWT); both send a valid JWT.
[functions.domain-balance-check]
verify_jwt = true

# icount-invoices + google-reviews are called by the logged-in merchant only.
[functions.icount-invoices]
verify_jwt = true

[functions.google-reviews]
verify_jwt = true

# daily-digest is triggered by pg_cron with the x-cron-secret header (no JWT).
[functions.daily-digest]
verify_jwt = false

# ── Email marketing ──────────────────────────────────────────────────────────
# email-subscribe is the PUBLIC storefront newsletter signup (anonymous visitor).
[functions.email-subscribe]
verify_jwt = false

# email-track-open is the 1x1 pixel hit from the recipient's email client (public).
[functions.email-track-open]
verify_jwt = false

# email-track-click is the redirect hit from a link in a sent email (public).
[functions.email-track-click]
verify_jwt = false

# email-track-cart is called from the PUBLIC storefront (abandoned-cart capture).
[functions.email-track-cart]
verify_jwt = false

# email-scheduled-run + email-abandoned-run are invoked by pg_cron (no user JWT).
[functions.email-scheduled-run]
verify_jwt = false

[functions.email-abandoned-run]
verify_jwt = false

# email-campaign-send + email-automations are called by the logged-in merchant.
[functions.email-campaign-send]
verify_jwt = true

[functions.email-automations]
verify_jwt = true
