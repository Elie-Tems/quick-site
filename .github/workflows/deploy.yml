name: Deploy to Cloudflare Pages

# Auto-deploys the site to Cloudflare Pages on every push to main.
# Replaces the manual `wrangler pages deploy`. The only secret you must add in
# GitHub (Settings -> Secrets and variables -> Actions) is CLOUDFLARE_API_TOKEN
# (a token with the "Cloudflare Pages: Edit" permission).
#
# The VITE_* values below are build-time PUBLIC values (the Supabase anon key,
# public URLs) - they are embedded in the browser bundle anyway, so it is safe
# to keep them here. WhatsApp/business-email stay OFF (their flags are not set).

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_PROJECT_ID: ytqgeoviokgxxwalieev
          VITE_SUPABASE_URL: https://ytqgeoviokgxxwalieev.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0cWdlb3Zpb2tneHh3YWxpZWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzMTA0NjYsImV4cCI6MjA4Njg4NjQ2Nn0.jeSSSbTP3CbKVjlzqlYavwoGqooLW7bLV9JQTY9RhD8
          VITE_WEBSITE_URL: siango.app
          VITE_ORDER_WEBHOOK_URL: https://hook.eu2.make.com/09a6csp2wh8vgncyi5q88mcd9brwzdnu
          # iCount hosted payment page for the publish subscription (הוראת קבע ₪69/mo).
          VITE_ICOUNT_PAYMENT_BASE_URL: https://app.icount.co.il/m/36af1/c6938b7dp4u6a454dd6
          # PAID publishing: publish now routes to the iCount payment page.
          # To fully lock it, also set ALLOW_UNVERIFIED_PUBLISH=false on finalize-publish.
          # (Set VITE_PUBLISH_SKIP_PAYMENT back to "true" to revert to free publishing.)
          VITE_PUBLISH_SKIP_PAYMENT: "false"
          # Self-managed token billing is LIVE (default for everyone): publish routes
          # to the iCount token page (#9), we store the card + charge the first month
          # via cc/bill (coupon-aware), then the monthly cron. Set back to "false" to
          # revert to the legacy iCount הו"ק page. Charges are real unless the Supabase
          # secret BILLING_TEST_MODE="true" is set.
          VITE_BILLING_SELF_MANAGED: "true"
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 6994fb55d0f593edfbd959e465045141
          command: pages deploy dist --project-name=siango --branch=main
