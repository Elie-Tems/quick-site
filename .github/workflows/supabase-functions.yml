name: Deploy Supabase Edge Functions

# Auto-deploys all Supabase edge functions on every push to main, so deploys no
# longer need a personal access token pasted into a chat / terminal. The ONLY
# secret to add in GitHub (Settings -> Secrets and variables -> Actions) is:
#   SUPABASE_ACCESS_TOKEN  - a Supabase access token (Account -> Access Tokens).
#
# Function-level secrets (API keys, webhook secrets) live in the Supabase
# dashboard, NOT here - this only ships the function CODE. verify_jwt settings
# come from supabase/config.toml, which the CLI reads automatically.
#
# NOTE: database migrations are intentionally NOT run here yet. Several were
# applied via the Management API rather than `supabase db push`, so the remote
# migration history must be reconciled before CI can own `db push` safely.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-functions.yml"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Only the newest push matters - cancel superseded in-progress deploys so rapid
# pushes don't stack up (and don't each send a failure notification).
concurrency:
  group: deploy-edge-functions
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ytqgeoviokgxxwalieev
    steps:
      - uses: actions/checkout@v4

      # Skip cleanly (success, no failure email) until the token secret is added.
      - name: Check for deploy token
        id: token
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "SUPABASE_ACCESS_TOKEN not set - skipping auto-deploy. Add it in repo Settings -> Secrets to enable."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: supabase/setup-cli@v1
        if: steps.token.outputs.enabled == 'true'
        with:
          version: latest

      # Retry transient failures (esm.sh/CDN 522, network blips, image pulls) instead
      # of failing the whole run and emailing a "deploy failed" notification. Only a
      # genuinely persistent failure (all attempts) fails the workflow.
      - name: Deploy all edge functions (with retry)
        if: steps.token.outputs.enabled == 'true'
        run: |
          for attempt in 1 2 3 4; do
            echo "::group::Deploy attempt $attempt"
            if supabase functions deploy --project-ref "$PROJECT_REF"; then
              echo "::endgroup::"
              echo "Deploy succeeded on attempt $attempt."
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed (usually a transient CDN/network blip). Retrying..."
            sleep $((attempt * 20))
          done
          echo "All 4 deploy attempts failed - this looks like a real problem."
          exit 1
