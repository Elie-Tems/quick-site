name: Deploy Edge Functions

# Auto-deploy all Supabase edge functions on push to main whenever a function
# (or the functions config) changes. This closes the CLAUDE.md "golden rule" gap:
# code that lives in the repo but was never `supabase functions deploy`-d returns
# 404 in production. With this, merging to main IS the deploy - no manual step.
#
# Requires one repo secret: SUPABASE_ACCESS_TOKEN (a Supabase personal access
# token, generated at supabase.com/dashboard/account/tokens). verify_jwt per
# function is read from supabase/config.toml, so public functions stay public.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all edge functions
        run: supabase functions deploy --project-ref ytqgeoviokgxxwalieev
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
